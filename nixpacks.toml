providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = '20'
NIXPACKS_PACKAGE_MANAGER = 'npm'

[phases.install]
# On force la suppression du lockfile capricieux et on fait une installation fraîche spéciale Linux
cmds = ['rm -f package-lock.json', 'npm install']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'node .output/server/index.mjs'